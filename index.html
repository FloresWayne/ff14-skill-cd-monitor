<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>技能CD监控</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: transparent;
      overflow: hidden;
    }
    #log {
      position: fixed; top: 4px; left: 4px;
      font-size: 11px; line-height: 1.4;
      color: rgba(255,255,255,0.85); font-family: "Microsoft YaHei", monospace;
      pointer-events: none; white-space: pre-wrap;
      max-width: 480px; max-height: 200px; overflow: hidden;
      text-shadow: 0 0 3px #000, 0 0 2px #000;
    }
  </style>
</head>
<body>
  <div id="log"></div>

  <!-- ============================================================ -->

</html>
